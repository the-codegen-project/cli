name: Release

on:
  push:
    branches:
      - main
      - next

jobs:
  test-nodejs:
    # We just check the message of first commit as there is always just one commit because we squash into one before merging
    # "commits" contains array of objects where one of the properties is commit "message"
    # Release workflow will be skipped if release conventional commits are not used
    if: |
      startsWith( github.repository, 'the-codegen-project/' ) && 
      (startsWith( github.event.commits[0].message , 'fix' ) ||
      startsWith( github.event.commits[0].message, 'feat' ))
    name: Test NodeJS release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Set git to use LF #to once and for all finish neverending fight between Unix and Windows
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        shell: bash
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check package-lock version
        uses: asyncapi/.github/.github/actions/get-node-version-from-package-lock@master
        id: lockversion
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.lockversion.outputs.version }}"
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Run test
        run: npm test --if-present

  release:
    needs: [test-nodejs]
    name: Publish to any of NPM, Github, or Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Set git to use LF #to once and for all finish neverending fight between Unix and Windows
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check package-lock version
        uses: asyncapi/.github/.github/actions/get-node-version-from-package-lock@master
        id: lockversion
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.lockversion.outputs.version }}"
      - name: Install dependencies
        shell: bash
        run: npm ci
      - name: Add plugin for conventional commits for semantic-release
        run: npm install --save-dev conventional-changelog-conventionalcommits@5.0.0
      - name: Publish to any of NPM and Github
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: jonaslagoni
          GIT_AUTHOR_EMAIL: jonas-lt@live.dk
          GIT_COMMITTER_NAME: jonaslagoni
          GIT_COMMITTER_EMAIL: jonas-lt@live.dk
        run: npx semantic-release@19.0.4
      - name: Regenerate committed examples against the released CLI
        # Examples carry committed generated output; refresh it so it never
        # drifts from the CLI. Only commits back when generation actually
        # changed something, and [skip ci] avoids re-triggering this workflow.
        if: steps.release.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm run generate:examples
          if [ -z "$(git status --porcelain examples)" ]; then
            echo "Examples already up to date."
            exit 0
          fi
          git config user.name jonaslagoni
          git config user.email jonas-lt@live.dk
          git add examples
          git commit -m "chore: regenerate examples [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"